services:
  # 1. Frontend (Free Static Site)
  - type: web
    name: health-predictor-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: health-predictor-backend
          envVarKey: RENDER_EXTERNAL_URL

  # 2. Backend (Node.js API)
  - type: web
    name: health-predictor-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          type: web
          name: health-predictor-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: MONGODB_URI
        sync: false # You MUST set this manually in the Render Dashboard!
      - key: JWT_SECRET
        sync: false # You MUST set this manually in the Render Dashboard!
      - key: GOOGLE_AI_API_KEY
        sync: false # You MUST set this manually in the Render Dashboard!
      - key: TEXT_ML_URL
        value: http://localhost:8001
      - key: IMAGE_ML_URL
        value: http://localhost:8002
      - key: BRAIN_ML_URL
        value: http://localhost:8003
      - key: FACE_ML_URL
        value: http://localhost:8004
