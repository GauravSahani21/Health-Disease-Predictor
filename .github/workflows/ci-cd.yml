name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend
  IMAGE_NAME_ML_TEXT: ${{ github.repository }}/ml-text
  IMAGE_NAME_ML_IMAGE: ${{ github.repository }}/ml-image

jobs:
  # Linting and Tests
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend, ml_text, ml_image]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js (for backend/frontend)
        if: matrix.service == 'backend' || matrix.service == 'frontend'
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Set up Python (for ML services)
        if: matrix.service == 'ml_text' || matrix.service == 'ml_image'
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies (Backend/Frontend)
        if: matrix.service == 'backend' || matrix.service == 'frontend'
        working-directory: ./${{ matrix.service }}
        run: npm ci

      - name: Install dependencies (ML Services)
        if: matrix.service == 'ml_text' || matrix.service == 'ml_image'
        working-directory: ./${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Lint (Backend/Frontend)
        if: matrix.service == 'backend' || matrix.service == 'frontend'
        working-directory: ./${{ matrix.service }}
        run: npm run lint

      - name: Run tests (Backend)
        if: matrix.service == 'backend'
        working-directory: ./backend
        run: npm test
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: test_secret

      - name: Run tests (Frontend)
        if: matrix.service == 'frontend'
        working-directory: ./frontend
        run: npm test -- --coverage

      - name: Run tests (ML Services)
        if: matrix.service == 'ml_text' || matrix.service == 'ml_image'
        working-directory: ./${{ matrix.service }}
        run: pytest tests/ -v --cov=app

  # Build Docker Images (only on push to main)
  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service: ml_text
            context: ./ml_text
            dockerfile: ./ml_text/Dockerfile
          - service: ml_image
            context: ./ml_image
            dockerfile: ./ml_image/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging (optional)
  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.health-predictor.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubernetes context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f infra/k8s/staging/
          kubectl rollout status deployment/backend -n health-predictor-staging
          kubectl rollout status deployment/frontend -n health-predictor-staging
          kubectl rollout status deployment/ml-text -n health-predictor-staging
          kubectl rollout status deployment/ml-image -n health-predictor-staging

      - name: Run smoke tests
        run: |
          curl -f https://staging.health-predictor.example.com/health || exit 1
          curl -f https://staging.health-predictor.example.com/api/health || exit 1
